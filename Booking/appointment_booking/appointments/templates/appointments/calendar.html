<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Calendar</title>
    <style>
        /* Calendar Styles */
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 20px;
        }

        #calendar {
            width: 100%;
            max-width: 600px;
            border: 1px solid #ddd;
            padding: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .calendar-header button {
            padding: 5px 10px;
            border: none;
            background-color: #007BFF;
            color: white;
            cursor: pointer;
            border-radius: 3px;
        }

        .calendar-header button:hover {
            background-color: #0056b3;
        }

        .calendar-days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            margin-top: 10px;
            text-align: center;
        }

        #available-hours {
            margin-top: 20px;
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        .slot {
            padding: 10px;
            margin: 5px;
            display: inline-block;
            border: 1px solid #007BFF;
            border-radius: 5px;
            background-color: #f0f8ff;
            cursor: pointer;
        }

        .slot:hover {
            background-color: #007BFF;
            color: white;
        }

        .no-slots {
            margin-top: 10px;
            color: #888;
        }

        #form-container {
            margin-top: 20px;
            text-align: center;
        }

        #form-container input {
            margin: 5px;
            padding: 10px;
            font-size: 1rem;
        }

        #form-container button {
            padding: 10px 20px;
            font-size: 1rem;
            background-color: #28a745;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        #form-container button:hover {
            background-color: #218838;
        }

        .slot.selected {
            background-color: #007BFF;
            color: white;
        }

        .day {
            position: relative;
            text-align: center;
            padding: 10px;
            cursor: pointer;
        }
        
        .available-dot {
    width: 6px;
    height: 6px;
    background-color: blue;
    border-radius: 50%;
    position: absolute;
    bottom: 5px; /* Adjust position as needed */
    left: 50%;
    transform: translateX(-50%);
}
        
        .today {
            background-color: #007BFF;
            color: white;
            font-weight: bold;
        }
        
        .today:hover {
            background-color: #0056b3;
        }
        

    </style>
</head>
<body>
    <h1>Custom Calendar</h1>
    <div id="calendar">
        <div class="calendar-header">
            <button id="prev">Previous</button>
            <h2 id="month-year"></h2>
            <button id="next">Next</button>
        </div>
        <div class="calendar-days" id="calendar-days"></div>
    </div>

    <div id="available-hours">
        <h2>Available Hours</h2>
        <div id="slots-container"></div>
    </div>

    <div id="form-container" style="display:none;">
        <h3>Book an Appointment for <span id="selected-date"></span></h3>
        <input type="email" id="email" placeholder="Enter your email" required />
        <input type="tel" id="phone" placeholder="Enter your phone number" required />
        <button id="submit-appointment">Submit</button>
    </div>

    <script>
        // JavaScript code for calendar rendering and appointment booking
        const calendarDays = document.getElementById('calendar-days');
        const monthYear = document.getElementById('month-year');
        const prevButton = document.getElementById('prev');
        const nextButton = document.getElementById('next');
        const slotsContainer = document.getElementById('slots-container');
        const formContainer = document.getElementById('form-container');
        const selectedDateElem = document.getElementById('selected-date');
        const submitButton = document.getElementById('submit-appointment');

        let date = new Date();

        function renderCalendar() {
            const currentMonth = date.getMonth();
            const currentYear = date.getFullYear();
            const today = new Date();

            const monthNames = [
                "January", "February", "March", "April", "May", "June",
                "July", "August", "September", "October", "November", "December"
            ];
            monthYear.textContent = `${monthNames[currentMonth]} ${currentYear}`;
            calendarDays.innerHTML = ''; // Clear previous calendar days

            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

            // Fetch available slots for the whole month
    fetchAvailableSlots(currentYear, currentMonth);

    for (let i = 0; i < firstDay; i++) {
        const blankDay = document.createElement('div');
        blankDay.classList.add('day');
        calendarDays.appendChild(blankDay);
    }

    for (let day = 1; day <= daysInMonth; day++) {
        const dayElement = document.createElement('div');
        dayElement.classList.add('day');
        dayElement.textContent = day;

        const dateToCheck = new Date(currentYear, currentMonth, day);
        const formattedDate = dateToCheck.toISOString().split('T')[0]; // Format the date as YYYY-MM-DD

        // Disable past days
        if (dateToCheck < today) {
            dayElement.style.color = "#ccc";
            dayElement.style.pointerEvents = "none";
        } else {
            dayElement.addEventListener('click', () => {
                fetchAvailableSlotsForDay(formattedDate, dayElement); // Fetch slots for clicked day
            });
        }

        // Check if it's today's date
        if (
            day === today.getDate() &&
            currentMonth === today.getMonth() &&
            currentYear === today.getFullYear()
        ) {
            dayElement.classList.add('today');
        }

        calendarDays.appendChild(dayElement);
    }
}
        // Fetch available slots for the whole month
function fetchAvailableSlots(year, month) {
    fetch(`/appointments/available-dates/?year=${year}&month=${month + 1}`)
        .then(response => response.json())
        .then(data => {
            if (data.available_dates) {
                markAvailableDates(data.available_dates); // Mark available days with blue dot
            }
        })
        .catch(error => console.error('Error fetching available dates:', error));
}

// Fetch available slots for a specific day
function fetchAvailableSlotsForDay(formattedDate, dayElement) {
    fetch(`/appointments/available-slots/?date=${formattedDate}`)
        .then(response => response.json())
        .then(data => {
            if (data.available_slots && data.available_slots.length > 0) {
                addBlueDot(dayElement); // Add blue dot if there are available slots
                displayAvailableSlots(data.available_slots, formattedDate);
            } else {
                removeBlueDot(dayElement); // Remove blue dot if no slots available
                slotsContainer.innerHTML = '<p class="no-slots">No available slots for this day.</p>';
            }
        })
        .catch(error => console.error('Error fetching available slots:', error));
}

// Mark available dates with a blue dot
function markAvailableDates(availableDates) {
    const days = document.querySelectorAll('.day');
    days.forEach(dayElement => {
        const dayText = dayElement.textContent;
        const dayDate = new Date(currentYear, currentMonth, dayText); // Get the date for the current dayElement
        const formattedDate = dayDate.toISOString().split('T')[0]; // Format the date as YYYY-MM-DD

        if (availableDates.includes(formattedDate)) {
            addBlueDot(dayElement); // Add a blue dot to the day
        }
    });
}

// Add blue dot to the day element
function addBlueDot(dayElement) {
    const dot = document.createElement('span');
    dot.classList.add('available-dot');
    dayElement.appendChild(dot);
}

// Remove blue dot from the day element
function removeBlueDot(dayElement) {
    const dot = dayElement.querySelector('.available-dot');
    if (dot) {
        dot.remove();
    }
}

// Display available slots for a specific day
function displayAvailableSlots(availableSlots, formattedDate) {
    slotsContainer.innerHTML = ''; // Clear previous slots
    availableSlots.forEach(slot => {
        const slotElement = document.createElement('div');
        slotElement.classList.add('slot');
        slotElement.dataset.start = slot.start_time; // Store start time as data attribute
        slotElement.dataset.end = slot.end_time; // Store end time as data attribute
        slotElement.dataset.date = formattedDate; // Store date as data attribute

        // Format the slot time (assuming slot contains start_time and end_time)
        const formattedStartTime = formatTime(slot.start_time); // Format start time
        const formattedEndTime = formatTime(slot.end_time); // Format end time

        // Display slot with start and end time
        slotElement.innerHTML = `
            <p>${formattedStartTime}</p>
        `;
        slotsContainer.appendChild(slotElement);

        // Make the entire div clickable and show the form
        slotElement.addEventListener('click', (event) => {
            const selectedDate = event.target.dataset.date;
            const startTime = event.target.dataset.start;
            const endTime = event.target.dataset.end;

            // Populate the form with the selected date and times
            populateForm(selectedDate, startTime, endTime);
        });
    });
}


// Format time to a more readable format (e.g., 14:00 -> 2:00 PM)
function formatTime(time) {
    const [hours, minutes] = time.split(':');
    let formattedTime = `${parseInt(hours)}:${minutes}`;
    const ampm = hours >= 12 ? 'PM' : 'AM';
    if (hours > 12) {
        formattedTime = `${parseInt(hours) - 12}:${minutes} ${ampm}`;
    } else if (hours === '00') {
        formattedTime = `12:${minutes} ${ampm}`;
    } else {
        formattedTime = `${formattedTime} ${ampm}`;
    }
    return formattedTime;
}

// Populate the form with the selected date and time
function populateForm(date, startTime, endTime) {
    // Show the form
    const formContainer = document.getElementById('form-container');
    formContainer.style.display = 'block';

    // Populate the date and time fields
    document.getElementById('selected-date').textContent = `${date} (${startTime} - ${endTime})`;
    document.getElementById('form-container').dataset.date = date;
    document.getElementById('form-container').dataset.start = startTime;
    document.getElementById('form-container').dataset.end = endTime;
}

        submitButton.addEventListener('click', () => {
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const selectedDate = selectedDateElem.textContent;
            const selectedSlot = document.querySelector('.slot.selected');
            if (!selectedSlot) return alert("Please select a slot.");

            const startTime = selectedSlot.dataset.startTime;
            const endTime = selectedSlot.dataset.endTime;
            if (!email || !phone) return alert("Fill in all fields.");

            fetch('/appointments/book-appointment/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken')
                },
                body: JSON.stringify({
                    email, phone_number: phone, date: selectedDate, start_time: startTime, end_time: endTime
                })
            })
                .then(response => response.json())
                .then(data => {
                    if (data.message) {
                        alert(data.message);
                        formContainer.style.display = 'none';
                    } else alert('Error: ' + data.error);
                })
                .catch(error => console.error('Error booking appointment:', error));
        });

        function getCookie(name) {
            const cookies = document.cookie.split(';').map(c => c.trim());
            for (const cookie of cookies) {
                if (cookie.startsWith(name + '=')) return decodeURIComponent(cookie.split('=')[1]);
            }
            return null;
        }

        prevButton.addEventListener('click', () => {
            date.setMonth(date.getMonth() - 1);
            renderCalendar();
        });

        nextButton.addEventListener('click', () => {
            date.setMonth(date.getMonth() + 1);
            renderCalendar();
        });

        renderCalendar();
    </script>
</body>
</html>

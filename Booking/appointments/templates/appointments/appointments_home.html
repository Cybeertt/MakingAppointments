<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Calendar</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="font-sans bg-gray-50 min-h-screen flex flex-col items-center p-6">
    <h1 class="text-2xl sm:text-3xl font-bold text-gray-800 mb-6">Custom Calendar</h1>
    <div id="calendar" class="w-full max-w-3xl bg-white border border-gray-200 rounded-lg shadow-sm p-4">
        <h2 class="text-xl font-semibold text-gray-800 mb-3">Available Dates</h2>
        <div id="calendar-days" class="calendar-days grid grid-cols-7 gap-2 text-center"></div>
    </div>

    <div id="time-slots" class="time-slots hidden w-full max-w-3xl text-center mt-6">
        <h3 class="text-lg font-semibold text-gray-800 mb-2">Available Time Slots</h3>
        <div id="time-slots-list" class="flex flex-wrap gap-2 justify-center"></div>
    </div>
</body>
</html>
